<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="/assets/css/style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="/">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="/">Home</a>
          <a href="https://g4g4n.com">Portfolio</a>
          <a href="https://medium.com/@g4g4n">Medium</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p>Published from GitHub Pages at <a href="https://blog.g4g4n.com">blog.g4g4n.com</a>.</p>
      </div>
    </footer>
  </body>
</html>
